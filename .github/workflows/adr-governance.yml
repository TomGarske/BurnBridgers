name: ADR Governance

on:
  pull_request:
    branches:
      - main
      - develop
    types:
      - opened
      - edited
      - synchronize
      - reopened
      - ready_for_review
  pull_request_review:
    branches:
      - main
      - develop
    types:
      - submitted
      - dismissed

permissions:
  contents: read
  pull-requests: read

jobs:
  pr-metadata-gate:
    name: PR Metadata Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate required PR metadata
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: python3 scripts/ci/check_pr_metadata.py

  architecture-sensitive-adr-gate:
    name: Architecture Sensitive ADR Gate
    runs-on: ubuntu-latest
    steps:
      - name: Check ADR reference for architecture-sensitive diffs
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const prNumber = pr.number;

            const sensitivePatterns = [
              /^src\/platform\//,
              /^src\/infrastructure\//,
              /^src\/api\//,
              /^src\/auth\//,
              /^src\/events\//,
              /^src\/db\//,
              /^terraform\//,
              /^infra\//,
              /^scripts\/autoload\//,
              /^scripts\/.*\.gd$/,
              /^scenes\/.*\.tscn$/,
            ];

            const files = await github.paginate(
              github.rest.pulls.listFiles,
              { owner, repo, pull_number: prNumber, per_page: 100 }
            );

            const changed = files.map(f => f.filename);
            const touchedSensitive = changed.some(path =>
              sensitivePatterns.some(pattern => pattern.test(path))
            );

            if (!touchedSensitive) {
              core.info("No architecture-sensitive paths changed.");
              return;
            }

            const adrFileChanged = changed.some(path => /^docs\/adr\/\d{4}-.*\.md$/i.test(path));
            const text = `${pr.title || ""}\n${pr.body || ""}`;
            const hasAdrReference = /ADR-\d{4}/i.test(text) || /\bnone\b/i.test(text);

            if (!adrFileChanged && !hasAdrReference) {
              core.setFailed(
                "Architecture-sensitive files changed but no ADR file or ADR reference found in PR title/body."
              );
              return;
            }

            core.info("Architecture-sensitive ADR gate passed.");

  tom-review-gate:
    name: TomGarske Review Gate
    runs-on: ubuntu-latest
    steps:
      - name: Require TomGarske approval for non-TomGarske PRs
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            const pr =
              context.payload.pull_request ||
              (context.payload.review ? context.payload.review.pull_request : null);

            if (!pr) {
              core.setFailed("Unable to determine pull request context.");
              return;
            }

            const author = (pr.user?.login || "").toLowerCase();
            const requiredReviewer = "tomgarske";

            if (author === requiredReviewer) {
              core.info("PR author is TomGarske; review requirement is waived.");
              return;
            }

            const reviews = await github.paginate(
              github.rest.pulls.listReviews,
              { owner, repo, pull_number: pr.number, per_page: 100 }
            );

            const tomReviews = reviews
              .filter(r => (r.user?.login || "").toLowerCase() === requiredReviewer)
              .sort((a, b) => new Date(a.submitted_at) - new Date(b.submitted_at));

            if (tomReviews.length === 0) {
              core.setFailed("TomGarske approval is required for PRs authored by others.");
              return;
            }

            const latestTomState = tomReviews[tomReviews.length - 1].state;
            if (latestTomState !== "APPROVED") {
              core.setFailed(
                `Latest TomGarske review state is ${latestTomState}; APPROVED is required.`
              );
              return;
            }

            core.info("TomGarske approval requirement satisfied.");
